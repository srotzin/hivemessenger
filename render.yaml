services:
  - type: web
    name: hivemessenger
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: HIVE_INTERNAL_KEY
        value: hive_internal_125e04e071e8829be631ea0216dd4a0c9b707975fcecaf8c62c6a2ab43327d46
      - key: DISCOVERY_URL
        value: https://hive-discovery.onrender.com
      - key: HIVEGATE_URL
        value: https://hivegate.onrender.com
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: true
